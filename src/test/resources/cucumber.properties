# Cucumber Configuration Properties
# This file configures Cucumber behavior

# Parallel execution settings
cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.mode.features=true
cucumber.execution.parallel.mode.scenarios=true
cucumber.execution.parallel.config.strategy=dynamic
cucumber.execution.parallel.config.dynamic.factor=1.0

# Feature file locations
cucumber.features=src/test/resources/features

# Step definition package
cucumber.glue=testorbit.stepdefinitions,testorbit.tests.base

# Plugin configurations
cucumber.plugin=pretty,html:reports/cucumber/cucumber-report.html,json:reports/cucumber/cucumber-report.json,junit:reports/cucumber/cucumber-report.xml

# Reporting
cucumber.publish.enabled=false
cucumber.publish.quiet=true

# Object factory (for dependency injection if needed)
# cucumber.object-factory=io.cucumber.picocontainer.PicoFactory

# Snippet settings
cucumber.snippet-type=camelcase

# Dry run (set to true to validate feature files without execution)
cucumber.execution.dry-run=false

# Tags filter (can be overridden via command line)
# cucumber.filter.tags=@smoke

# Timeout settings
cucumber.execution.timeout.mode=thread_local
